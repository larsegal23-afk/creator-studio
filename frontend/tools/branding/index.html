<div class="card">

<h2>Branding Studio PRO</h2>

<input class="input" id="brand" placeholder="Brand name">
<br><br>
<input class="input" id="style" placeholder="Style (modern, tech, luxury)">

<br><br>

<button class="btn" onclick="runBranding()">
Generate Brand Kit
</button>

<div id="branding-result"></div>

</div>

<script>

function palette(){

let colors=[
"#7c3aed",
"#0ea5e9",
"#22c55e",
"#f59e0b",
"#ef4444"
];

return colors[Math.floor(Math.random()*colors.length)];

}

async function runBranding(){

let name=document.getElementById("brand").value;
let style=document.getElementById("style").value;

let result=`

<div class='card'>

<h3>`+name+`</h3>

Brand style: `+style+`

<br><br>

Primary color: `+palette()+`

<br>

Font idea: Inter / Poppins

<br><br>

Slogan idea:
"Next generation `+name+`"

</div>

`;

document.getElementById("branding-result").innerHTML="Generating...";

setTimeout(()=>{

document.getElementById("branding-result").innerHTML=result;

},1500);

}

</script>
