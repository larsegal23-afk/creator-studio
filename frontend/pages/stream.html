<section class="sheet-page">
  <article class="sheet-card">
    <header class="sheet-header-row">
      <div>Logo</div>
      <div>Stream Pack</div>
      <div>Branding studio</div>
      <div>Account</div>
      <div>Coins</div>
    </header>

    <div class="sheet-layout">
      <aside class="sheet-left-nav">
        <button class="sheet-nav-item" type="button" onclick="loadPage('logo')">Logo Builder</button>
        <button class="sheet-nav-item active" type="button">Stream Pack</button>
        <button class="sheet-nav-item" type="button" onclick="loadPage('video')">Video Builder</button>
      </aside>

      <section class="sheet-main">
        <div class="sheet-row">
          <label>Projektname</label>
          <input id="streamBrandName" type="text" placeholder="Name des Stream Packs">
        </div>

        <div class="sheet-row">
          <label>Asset Auswahl</label>
          <div class="sheet-check-grid">
            <label><input type="checkbox" name="streamAsset" value="Facecam Rahmen"> Facecam Rahmen (transparent)</label>
            <label><input type="checkbox" name="streamAsset" value="Alerts"> Alerts (transparent)</label>
            <label><input type="checkbox" name="streamAsset" value="Layout"> Layout (transparent)</label>
            <label><input type="checkbox" name="streamAsset" value="Pause Stream"> Pause Stream</label>
            <label><input type="checkbox" name="streamAsset" value="Stream beginnt"> Stream beginnt</label>
            <label><input type="checkbox" name="streamAsset" value="Stream endet"> Stream endet</label>
            <label><input type="checkbox" name="streamAsset" value="Sticker"> Sticker (transparent)</label>
          </div>
        </div>

        <div class="sheet-row">
          <label>Output format</label>
          <div class="sheet-check-grid">
            <label><input type="checkbox" name="streamFormat" value="16:9"> 16:9</label>
            <label><input type="checkbox" name="streamFormat" value="9:16"> 9:16</label>
          </div>
        </div>

        <div class="sheet-danger-note">Es werden nur ausgewaehlte Assets erstellt.</div>
        <div class="sheet-highlight">Pack erzeugen.</div>
        <div class="actions-row">
          <button id="generateStreamBtn" class="btn" type="button">Stream Pack erstellen</button>
        </div>

        <div id="streamPreview" class="sheet-result">Vorschau erscheint nach dem Erstellen.</div>
        <div id="streamDownloadArea" class="sheet-result">Download erscheint automatisch, sobald verfuegbar.</div>
      </section>

      <aside class="sheet-preview">
        <div class="sheet-preview-box">
          <div class="preview-placeholder">Pack-Vorschau</div>
        </div>
      </aside>
    </div>
  </article>
</section>
