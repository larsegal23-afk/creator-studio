<section class="page-stack">
  <article class="hero-card">
    <div class="hero-copy">
      <p class="hero-kicker">Zugang</p>
      <h1 id="authTitle">Anmelden und direkt starten.</h1>
      <p id="authSubtitle">
        Nach dem Login werden Coins und Module automatisch synchronisiert.
      </p>
    </div>
    <div class="hero-visual"></div>
  </article>

  <article class="card" style="max-width: 560px;">
    <div class="section-head">
      <div>
        <h2 id="formTitle">Login</h2>
        <p class="muted" id="formSubtitle">Sicher ueber Firebase.</p>
      </div>
      <div class="tabs">
        <button id="loginTab" class="tab active" type="button">Login</button>
        <button id="registerTab" class="tab" type="button">Registrieren</button>
      </div>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="form-grid auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" class="input" type="email" placeholder="name@studio.de" autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Passwort</label>
        <input id="password" class="input" type="password" placeholder="Passwort" autocomplete="current-password">
      </div>

      <div class="actions-row">
        <button id="loginBtn" class="btn" type="submit">Login</button>
      </div>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="form-grid auth-form hidden">
      <div class="field">
        <label for="regEmail">Email</label>
        <input id="regEmail" class="input" type="email" placeholder="name@studio.de" autocomplete="email">
      </div>

      <div class="field">
        <label for="regPassword">Passwort</label>
        <input id="regPassword" class="input" type="password" placeholder="Mindestens 6 Zeichen" autocomplete="new-password">
      </div>

      <div class="field">
        <label for="regPasswordConfirm">Passwort bestätigen</label>
        <input id="regPasswordConfirm" class="input" type="password" placeholder="Passwort wiederholen" autocomplete="new-password">
      </div>

      <div class="actions-row">
        <button id="registerBtn" class="btn primary" type="submit">Konto erstellen</button>
      </div>
    </form>

    <p id="loginHint" class="muted">Bitte mit deinem Konto anmelden.</p>
  </article>
</section>
