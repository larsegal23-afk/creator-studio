<section class="page-stack">
  <article class="hero-card">
    <div class="hero-copy">
      <p class="hero-kicker">Studio Cockpit</p>
      <h1>Stream Branding Studio</h1>
      <p>
       
      </p>
      <div class="hero-actions">
        <button class="btn" type="button" onclick="loadPage('logo')">Logo starten</button>
        <button class="btn secondary" type="button" onclick="loadPage('video')">Video Builder</button>
        <button class="btn secondary" type="button" onclick="loadPage('stream')">Stream Pack</button>
      </div>
    </div>
    <div class="hero-visual"></div>
  </article>

  <section class="stats-grid">
    <article class="stat-card">
      <p class="muted">Coins</p>
      <strong id="coinsValue" class="stat-value">-</strong>
      <script>
        // Load coins on dashboard init
        setTimeout(function() {
          if (typeof window.loadCoins === 'function') {
            window.loadCoins();
          }
        }, 500);
      </script>
    </article>
    <article class="stat-card">
      <p class="muted">Lokale Projekte</p>
      <strong id="projectsValue" class="stat-value">0</strong>
    </article>
   
  </section>

  <section class="grid">
    <article class="card">
      <div class="section-head">
        <div>
          <h2>Coins aufladen</h2>
          <p class="muted">Direkter Stripe-Checkout ueber das Backend.</p>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn" type="button" onclick="window.coinsManager?.purchaseCoins('starter')">120 Coins (4,99€)</button>
        <button class="btn secondary" type="button" onclick="window.coinsManager?.purchaseCoins('advanced')">300 Coins (9,99€)</button>
        <button class="btn secondary" type="button" onclick="window.coinsManager?.purchaseCoins('pro')">700 Coins (19,99€)</button>
        <button class="btn secondary" type="button" onclick="window.coinsManager?.purchaseCoins('ultimate')">2000 Coins (49,90€)</button>
      </div>
    </article>

    <article class="card">
      <div class="section-head">
        <div>
          <h2>Projekt-Übersicht</h2>
          <p class="muted">Zuletzt erzeugte Builder-Karten und lokale Entwuerfe.</p>
        </div>
      </div>
      <div id="projectOverview" class="tool-grid"></div>
    </article>
  </section>

  <article class="card">
    <div class="section-head">
      <div>
        <h2>Letzte Aktivitaeten</h2>
        <p class="muted">Direkt aus dem deployten Backend geladen.</p>
      </div>
    </div>
    <div id="activityFeed" class="grid"></div>
  </article>
</section>
