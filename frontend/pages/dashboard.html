<h1>Welcome back</h1>

<p style="color:#9ca3af;margin-bottom:20px;">
Create, manage and track your AI projects.
</p>

<div class="grid">

<!-- TOOLS -->

<div class="card">

<h3>Creator Tools</h3>

<p style="color:#9ca3af;margin-bottom:10px;">
Start building your content
</p>

<button onclick="loadPage('logo')">
🎨 Logo Creator
</button>

<button onclick="loadPage('video')">
🎬 Video Builder
</button>

<button onclick="loadPage('stream')">
📦 Stream Pack
</button>

</div>

<!-- USER STATS -->

<div class="card">

<h3>Your Stats</h3>

<p id="coins">Coins: loading...</p>

<p id="projects">Projects: loading...</p>

<small>Usage updates live</small>

</div>

<!-- BUY COINS -->

<div class="card">

<h3>Buy Coins</h3>

<p style="color:#9ca3af;margin-bottom:10px;">
Upgrade your creation power
</p>

<button onclick="buyCoins('small')">
120 Coins — $5
</button>

<button onclick="buyCoins('medium')">
300 Coins — $12
</button>

<button onclick="buyCoins('large')">
700 Coins — $25
</button>

</div>

</div>

<!-- ACTIVITY -->

<div class="card">

<h3>Recent Activity</h3>

<div id="activityList">
Loading activity...
</div>

</div>

<script src="../js/dashboard.js"></script>

<script>

/* 🔥 STRIPE BUY */

async function buyCoins(pack){

const res =
await authFetch(
"/api/stripe/create-checkout",
{
method:"POST",
body:JSON.stringify({pack})
}
);

if(!res){
return;
}

const data = await res.json();

if(data.url){

window.location.href = data.url;

}else{

showToast("Payment error","error");

}

}

/* LOAD ACTIVITY */

async function loadActivity(){

try{

const res =
await authFetch("/api/activity");

if(!res || !res.ok){
throw new Error();
}

const data =
await res.json();

let html="";

/* EMPTY */

if(!data || data.length===0){

html="<p style='color:#9ca3af'>No activity yet</p>";

document
.getElementById("activityList")
.innerHTML=html;

return;

}

/* BUILD */

data.forEach(a=>{

html+=`

<div class="card">

<p><b>${a.type || "Activity"}</b></p>

<p style="color:#9ca3af">${a.reference || ""}</p>

<p style="color:#7c3aed">

Coins: ${a.amount ?? 0}

</p>

</div>

`;

});

document
.getElementById("activityList")
.innerHTML=html;

}catch(e){

document
.getElementById("activityList")
.innerHTML=

"<p style='color:red'>Failed loading activity</p>";

}

}

/* INIT */

async function initDashboard(){

if(typeof loadUser==="function"){
await loadUser();
}

await loadActivity();

}

/* START */

setTimeout(()=>{
initDashboard();
},100);

</script>
