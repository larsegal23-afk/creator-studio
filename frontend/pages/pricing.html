<div class="pricing-container">

  <div class="card">
    <h3>120 Coins</h3>
    <p>Starter</p>
    <h2>4,99 €</h2>
    <button onclick="buyCoins('coins120')">Kaufen</button>
  </div>

  <div class="card best">
    <span class="badge">Beliebt</span>
    <h3>700 Coins</h3>
    <p>Bester Wert</p>
    <h2>19,99 €</h2>
    <button onclick="buyCoins('coins700')">Kaufen</button>
  </div>

  <div class="card premium">
    <span class="badge">Premium</span>
    <h3>2000 Coins</h3>
    <p>Fuer Teams</p>
    <h2>49,99 €</h2>
    <button onclick="buyCoins('coins2000')">Kaufen</button>
  </div>

</div>
<script>
async function buyCoins(pack) {
  try {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Bitte einloggen!");
      return;
    }

    const res = await fetch("https://logomakergermany-ultimate-backend-production.up.railway.app/api/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ pack })
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Fehler beim Checkout");
    }

  } catch (err) {
    console.error(err);
    alert("Server Fehler");
  }
}
</script>
