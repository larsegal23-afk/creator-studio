<section class="page-stack">
  <article class="card">
    <div class="section-head">
      <div>
        <h2>Branding Studio</h2>
        <p class="muted">Felder fuer Name, Clan/Agent, Spiel, Stil und Mehrfachfarben.</p>
      </div>
    </div>

    <div class="builder-grid">
      <div class="page-stack">
        <div class="form-grid">
          <div class="field">
            <label>Name</label>
            <input id="logoName" class="input" type="text" placeholder="Enter your name">
          </div>

          <div class="field">
            <label>Clan</label>
            <input id="logoClan" class="input" type="text" placeholder="Enter your clan name">
          </div>

          <div class="field">
            <label>Game</label>
            <select id="logoGame" title="Select a game">
              <option value="">-</option>
              <option>Fortnite</option>
              <option>Call of Duty</option>
              <option>Valorant</option>
            </select>
          </div>

          <div class="field">
            <label>Style</label>
            <select id="logoStyle" title="Select a style">
              <option value="">-</option>
              <option>Anime</option>
              <option>Esports</option>
              <option>Fantasy</option>
              <option>Cyber</option>
            </select>
          </div>
        </div>

        <div class="actions-row">
          <button id="generateLogoBtn" class="btn">Generate Logo</button>
          <button id="reuseDnaBtn" class="btn secondary">DNA laden</button>
        </div>

        <!-- 🔥 NEU -->
        <div class="actions-row">
          <button id="genBanner" class="btn secondary">Banner</button>
          <button id="genSticker" class="btn secondary">Sticker</button>
          <button id="genFrame" class="btn secondary">Frame</button>
        </div>
      </div>

      <aside class="preview-pane">
        <div id="logoPreviewFrame" class="preview-frame">
          <div class="preview-placeholder">Hier erscheint dein Logo</div>
        </div>
      </aside>
    </div>
  </article>
</section>

<script>
function buildMagicPrompt(data) {
  return `
ultra detailed cinematic esports logo,
logo text: "${data.name}",
${data.clan ? "clan " + data.clan : ""}
${data.game ? "inspired by " + data.game : ""}
${data.style ? data.style + " style" : ""}
high contrast, glowing effects, 4k, sharp details
`;
}

// 🔥 LOGO GENERIEREN
document.getElementById("generateLogoBtn").onclick = async () => {
  const data = {
    name: document.getElementById("logoName").value,
    clan: document.getElementById("logoClan").value,
    game: document.getElementById("logoGame").value,
    style: document.getElementById("logoStyle").value
  };

  if (!data.name) return alert("Name fehlt");

  const prompt = buildMagicPrompt(data);

  const response = await window.authFetch("/api/generate-logo", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      prompt,
      requestId: `logo-inline-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`
    })
  });

  if (!response || !response.ok) {
    alert("Fehler");
    await window.loadUser?.();
    return;
  }

  const result = await response.json().catch(() => null);
  if (!result || !result.image) {
    alert("Fehler");
    await window.loadUser?.();
    return;
  }

  document.getElementById("logoPreviewFrame").innerHTML =
    `<img src="${result.image}" style="width:100%">`;

  localStorage.setItem("lastLogoDNA", JSON.stringify({ ...data, prompt }));
  await window.loadUser?.();
};

// 🔥 DNA LADEN
document.getElementById("reuseDnaBtn").onclick = () => {
  const dna = JSON.parse(localStorage.getItem("lastLogoDNA"));
  if (!dna) return alert("Keine DNA");

  document.getElementById("logoName").value = dna.name || "";
  document.getElementById("logoClan").value = dna.clan || "";
  document.getElementById("logoGame").value = dna.game || "";
  document.getElementById("logoStyle").value = dna.style || "";
};

// 🔥 EXTRAS
async function generateExtra(type) {
 const dna = JSON.parse(localStorage.getItem("lastLogoDNA"));
  if (!dna) return alert("Erst Logo erstellen!");

  let prompt = dna.prompt;

  if (type === "banner") prompt += ", wide banner";
  if (type === "sticker") prompt += ", sticker";
  if (type === "frame") prompt += ", webcam frame";

  const response = await window.authFetch("/api/generate-logo", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      prompt,
      requestId: `logo-extra-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`
    })
  });

  if (!response || !response.ok) {
    alert("Fehler");
    await window.loadUser?.();
    return;
  }

  const result = await response.json().catch(() => null);
  if (!result || !result.image) {
    alert("Fehler");
    await window.loadUser?.();
    return;
  }

  document.getElementById("logoPreviewFrame").innerHTML =
    `<img src="${result.image}" style="width:100%">`;
  await window.loadUser?.();
}

document.getElementById("genBanner").onclick = () => generateExtra("banner");
document.getElementById("genSticker").onclick = () => generateExtra("sticker");
document.getElementById("genFrame").onclick = () => generateExtra("frame");
</script>
