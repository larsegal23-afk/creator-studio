<h1>Logo Creator</h1>

<div class="card">

<h3>Generate AI Logo</h3>

<input id="brandName"
placeholder="Brand Name">

<br><br>

<button id="genBtn"
onclick="generateLogo()">

<button onclick="window.open('/api/download/'+lastJobId)">
Download Logo
</button>

Generate Logo

</button>

<div id="result"
style="margin-top:20px;"></div>

</div>

<div id="dnaList" style="margin-top:20px;"></div>

<script>

/* GENERATE LOGO */

async function generateLogo(){

const name=document
.getElementById("brandName")
.value.trim();

if(!name){

document.getElementById("result")
.innerHTML=
"<p style='color:#ff4d4d'>Enter brand name</p>";

return;

}

const btn=document.getElementById("genBtn");

btn.disabled=true;
btn.innerText="Generating...";

document.getElementById("result")
.innerHTML="Creating logo...";

runAITool(

"branding",

"Create a modern esports logo for "+name+
". Clean, bold, dark background, high contrast, centered icon.",

async (file)=>{

btn.disabled=false;
btn.innerText="Generate Logo";

/* SHOW IMAGE */

document.getElementById("result")
.innerHTML=`

<div class="card">

<h3>${name}</h3>

<img src="/results/${file}"
style="max-width:300px;border-radius:10px;" />

<p style="color:#7c3aed">
AI Generated Logo
</p>

<button onclick="saveProject('${name}','branding')">
Save Project
</button>

</div>

`;

/* UPDATE USER */

if(typeof loadUser==="function"){
loadUser();
}

/* 🔥 RELOAD DNA */

loadDNA();

}

);

}

/* LOAD DNA */

async function loadDNA(){

const res=await authFetch("/api/dna");

if(!res){
return;
}

const data=await res.json();

let html="<h3>Your Brand DNA</h3>";

if(!data || data.length===0){

html+="<p>No DNA yet</p>";

document.getElementById("dnaList").innerHTML=html;
return;

}

data.forEach(d=>{

html+=`

<div class="card">

<p><b>${d.name}</b></p>

<p style="font-size:12px">${d.prompt}</p>

<button onclick="reuseDNA('${encodeURIComponent(d.prompt)}')">
Reuse Style
</button>

</div>

`;

});

document.getElementById("dnaList").innerHTML=html;

}

/* REUSE DNA */

function reuseDNA(encodedPrompt){

const prompt=decodeURIComponent(encodedPrompt);

const btn=document.getElementById("genBtn");

btn.disabled=true;
btn.innerText="Generating...";

document.getElementById("result")
.innerHTML="Using saved style...";

runAITool(

"branding",

prompt,

(file)=>{

btn.disabled=false;
btn.innerText="Generate Logo";

document.getElementById("result")
.innerHTML+=

`<p style="color:#7c3aed">
Generated from saved DNA
</p>`;

if(typeof loadUser==="function"){
loadUser();
}

}

);

}

/* SAVE PROJECT */

async function saveProject(name,type){

await authFetch("/api/project",{

method:"POST",

body:JSON.stringify({
name,
type
})

});

document.getElementById("result")
.innerHTML+=
"<p style='color:lightgreen'>Saved ✓</p>";

}

/* INIT */

setTimeout(()=>{

loadDNA();

},100);

</script>
