<section class="sheet-page">
  <article class="sheet-card">
    <header class="sheet-header-row">
      <div>Logo</div>
      <div>Branding</div>
      <div>Branding studio</div>
      <div>Account</div>
      <div>Coins</div>
    </header>

    <div class="sheet-layout">
      <aside class="sheet-left-nav">
        <button class="sheet-nav-item active" type="button">Logo Builder</button>
        <button class="sheet-nav-item" type="button" onclick="loadPage('stream')">Stream Pack</button>
        <button class="sheet-nav-item" type="button" onclick="loadPage('video')">Video Builder</button>
      </aside>

      <section class="sheet-main">
        <div class="sheet-row">
          <label>Name</label>
          <input id="logoName" type="text" placeholder="Brand Name">
        </div>
        <div class="sheet-row">
          <label>Clan / Team</label>
          <input id="logoClan" type="text" placeholder="Optional">
        </div>
        <div class="sheet-row">
          <label>Game</label>
          <select id="logoGame" title="Game">
            <option value="Fortnite">Fortnite</option>
            <option value="Call of Duty">Call of Duty</option>
            <option value="Valorant">Valorant</option>
            <option value="Apex">Apex</option>
            <option value="CS2">CS2</option>
            <option value="LoL">LoL</option>
            <option value="FIFA">FIFA</option>
            <option value="PUBG">PUBG</option>
            <option value="Rocket League">Rocket League</option>
            <option value="Minecraft">Minecraft</option>
          </select>
        </div>
        <div class="sheet-row">
          <label>Style</label>
          <select id="logoStyle" title="Style">
            <option value="Esports">Esports</option>
            <option value="Anime">Anime</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Cyber">Cyber</option>
            <option value="Clean">Clean</option>
            <option value="Manga">Manga</option>
            <option value="Mascot">Mascot</option>
            <option value="Minimal">Minimal</option>
            <option value="3D">3D</option>
          </select>
        </div>

        <div class="sheet-row">
          <label>Farben</label>
          <div class="sheet-check-grid">
            <label><input type="checkbox" name="logoColor" value="Red"> Rot</label>
            <label><input type="checkbox" name="logoColor" value="Blue"> Blau</label>
            <label><input type="checkbox" name="logoColor" value="Green"> Gruen</label>
            <label><input type="checkbox" name="logoColor" value="Black"> Schwarz</label>
            <label><input type="checkbox" name="logoColor" value="Gold"> Gold</label>
            <label><input type="checkbox" name="logoColor" value="White"> Weiss</label>
          </div>
        </div>

        <div class="sheet-row">
          <label>Notizen</label>
          <textarea id="logoNotes" placeholder="Optionaler Feinschliff"></textarea>
        </div>

        <div class="sheet-highlight">Logo erzeugen und DNA automatisch speichern.</div>

        <div class="actions-row">
          <button id="generateLogoBtn" class="btn" type="button">Logo erstellen</button>
          <button id="reuseDnaBtn" class="btn secondary" type="button">DNA verwenden</button>
          <input id="logoUpload" type="file" accept=".png,.jpg,.jpeg,.webp" />
        </div>

        <div id="logoResult" class="sheet-result">Ergebnis und Aktionen erscheinen hier.</div>

        <div class="sheet-highlight">Varianten auf Basis der aktuellen DNA.</div>
        <div class="actions-row">
          <button id="genBanner" class="btn secondary" type="button">Banner</button>
          <button id="genSticker" class="btn secondary" type="button">Sticker</button>
          <button id="genFrame" class="btn secondary" type="button">Frame</button>
        </div>

        <div id="dnaLibrary" class="sheet-result">DNA-Bibliothek</div>
      </section>

      <aside class="sheet-preview">
        <div id="logoPreviewFrame" class="sheet-preview-box">
          <div class="preview-placeholder">Logo-Vorschau</div>
        </div>
      </aside>
    </div>
  </article>
</section>
