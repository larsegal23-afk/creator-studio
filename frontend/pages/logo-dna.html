<section class="page-stack">
  <article class="card">
    <div class="section-head">
      <div>
        <h2>Logo DNA</h2>
        <p class="muted">Markenprofil schnell erstellen und wiederverwenden.</p>
      </div>
    </div>

    <div class="builder-grid">
      <div class="page-stack">
        <div class="form-grid">
          <div class="field">
            <label>Markenname</label>
            <input id="dnaBrandName" class="input" type="text" placeholder="z. B. ShadowPeak">
          </div>
          <div class="field">
            <label>Archetyp</label>
            <select id="dnaArchetype" title="Archetyp">
              <option value="warrior">Warrior</option>
              <option value="guardian">Guardian</option>
              <option value="visionary">Visionary</option>
              <option value="phantom">Phantom</option>
              <option value="royal">Royal</option>
            </select>
          </div>
          <div class="field">
            <label>Branche / Game</label>
            <input id="dnaDomain" class="input" type="text" placeholder="Esports, SaaS, Creator, Valorant ...">
          </div>
          <div class="field">
            <label>Icon</label>
            <input id="dnaSymbol" class="input" type="text" placeholder="Wolf, Krone, Falcon, Schild ...">
          </div>
        </div>

        <div class="form-grid">
          <div class="field">
            <label>Energie (1-10)</label>
            <input id="dnaEnergy" class="input" type="range" min="1" max="10" value="7">
          </div>
          <div class="field">
            <label>Minimalismus (1-10)</label>
            <input id="dnaMinimalism" class="input" type="range" min="1" max="10" value="6">
          </div>
          <div class="field">
            <label>Farbstaerke (1-10)</label>
            <input id="dnaColorForce" class="input" type="range" min="1" max="10" value="8">
          </div>
          <div class="field">
            <label>Typografie (1-10)</label>
            <input id="dnaTypography" class="input" type="range" min="1" max="10" value="7">
          </div>
        </div>

        <div class="actions-row">
          <button id="buildDnaBtn" class="btn" type="button">Profil erstellen</button>
          <button id="saveDnaBlueprintBtn" class="btn secondary" type="button">Speichern</button>
          <button id="pushDnaToLogoBtn" class="btn secondary" type="button">In Logo uebernehmen</button>
        </div>
      </div>

      <aside class="preview-pane">
        <div id="dnaPreviewPanel" class="dna-preview">
          <div class="preview-placeholder">Vorschau erscheint nach der Analyse.</div>
        </div>
      </aside>
    </div>
  </article>

  <article class="card">
    <div class="section-head">
      <div>
        <h3>Bibliothek</h3>
        <p class="muted">Gespeicherte Profile sofort nutzen.</p>
      </div>
      <button id="exportDnaLibraryBtn" class="btn secondary" type="button">Exportieren</button>
    </div>
    <div id="logoDnaLibraryList" class="page-stack"></div>
  </article>
</section>
