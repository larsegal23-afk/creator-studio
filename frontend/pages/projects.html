<h1>Projects</h1>

<div class="card">

<h3>Your Projects</h3>

<div id="projectList">

container.innerHTML =
"<div class='loader'></div>";

</div>

</div>


<script>

async function loadProjects(){

const container =
document.getElementById("projectList");

container.innerHTML="Loading...";

try{

const res =
await authFetch("/api/projects");

const projects =
await res.json();

let html="";

/* EMPTY */

if(projects.length===0){

html = `

<div class="emptyState">

<h3>No projects yet</h3>

<p>Create your first project</p>

<button onclick="loadPage('logo')">

Create Logo

</button>

</div>

`;

}

/* BUILD CARDS */

projects.forEach(p=>{

html+=`

<div class="card project">

<h3>${p.name}</h3>

<p>Type: ${p.type}</p>

<button onclick="deleteProject(${p.id})">

Delete

</button>

</div>

`;

});

container.innerHTML=html;

}catch(e){

container.innerHTML=

"<p style='color:red'>Failed loading projects</p>";

}

}

async function deleteProject(id){

if(!confirm("Delete project?")){

return;

}

await authFetch("/api/deleteProject",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

id:id

})

});

/* RELOAD */

loadProjects();

/* REFRESH DASHBOARD */

if(typeof loadUser==="function"){

loadUser();

}

}

/* INIT */

loadProjects();

</script>
