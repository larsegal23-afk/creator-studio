  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzNqEXGDYnyyaxyi_dEkWR8ek3fsoMhFA",
      authDomain: "logomakergermany-kreativtool.firebaseapp.com",
      projectId: "logomakergermany-kreativtool"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);

    window.firebaseAuthApi = {
      async login(email, password) {
        const credential = await signInWithEmailAndPassword(auth, email, password);
        const token = await credential.user.getIdToken(true);
        localStorage.setItem("token", token);
        return credential.user;
      },
      async logout() {
        await signOut(auth);
        localStorage.removeItem("token");
      },
      async getToken(forceRefresh = false) {
        if (!auth.currentUser) {
          return localStorage.getItem("token");
        }

        const token = await auth.currentUser.getIdToken(forceRefresh);
        localStorage.setItem("token", token);
        return token;
      }
    };

    window.firebaseAuthReady = new Promise((resolve) => {
      onAuthStateChanged(auth, async (user) => {
        if (user) {
          const token = await user.getIdToken();
          localStorage.setItem("token", token);
        } else {
          localStorage.removeItem("token");
        }

        resolve(user);
        window.dispatchEvent(new CustomEvent("creator-auth-changed", { detail: { user } }));
      });
    });
  </script>
