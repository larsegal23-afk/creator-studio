<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Studio</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/ui.css">
  <link rel="stylesheet" href="css/tabs.css">
  <link rel="stylesheet" href="css/pricing.css">
</head>

<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-shell">
      <header id="topbar" class="topbar"></header>
      <section id="app" class="content"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <!-- 🔥 CONFIG (MUSS ZUERST!) -->
  <script src="config.js?v=3"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAzNqEXGDYnyyaxyi_dEkWR8ek3fsoMhFA",
      authDomain: "logomakergermany-kreativtool.firebaseapp.com",
      projectId: "logomakergermany-kreativtool"
    };

    firebase.initializeApp(firebaseConfig);

    window.login = async function(email, password) {
      try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
        const token = await userCredential.user.getIdToken();
        localStorage.setItem("token", token);
        return { success: true };
      } catch (error) {
        return { success: false, error: error.message };
      }
    };

    window.logout = async function() {
      await firebase.auth().signOut();
      localStorage.removeItem("token");
      window.location.href = "/";
    };

    firebase.auth().onAuthStateChanged(async (user) => {
      if (user) {
        const token = await user.getIdToken();
        localStorage.setItem("token", token);
      } else {
        localStorage.removeItem("token");
      }
    });
  </script>

  <!-- 🔥 API CLIENT (nach CONFIG!) -->
  <script src="js/api-client.js?v=4"></script>

  <!-- COMPONENTS -->
  <script src="components/topbar.js?v=4"></script>
  <script src="components/sidebar.js?v=4"></script>

  <!-- APP -->
  <script src="js/coins.js?v=4"></script>
  <script src="js/login-handler.js?v=4"></script>
  <script src="js/error-handler.js?v=4"></script>
  <script src="js/tools.js?v=4"></script>
  <script src="js/frontend-fixed.js?v=4"></script>
  <script src="js/router-fixed.js?v=4"></script>
  <script src="js/stripe-prices.js?v=4"></script>

</body>
</html>
